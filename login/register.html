<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Candra Kirana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <div class="form-wrapper">
        <h2>Daftar</h2>
        
        <form id="registerForm">
            <div class="form-control">
                <input type="text" id="usermane" required>
                <label>Nama Pengguna</label>
            </div>
             <div class="form-control">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>
            <div class="form-control">
                <input type="password" id="password" required>
                <label>Kata Sandi</label>
            </div>
            <button type="submit">Daftar</button>
            <div class="form-help"> 
                <div class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Ingat Aku</label>
                </div>
                <a href="#">Butuh Bantuan?</a>
            </div>
        </form>
        <p>Sudah Punya Akun? <a href="index.html">Masuk Sekarng</a></p>
    </div>
<p id="message" style="text-align: center; color white; margin-top: 15px"></p>
<script src="js/register.js" defer></script>                    
</body>
</html>
