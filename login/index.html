<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Candra Kirana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <img src="klepon.jpg" alt="background">
    </div>
  
    <div class="form-wrapper">
        <h2>Masuk</h2>
        <form id="loginForm">
            <div class="form-control">
                <input type="text" id="username"required>
                <label>Nama Pengguna</label>
            </div>
            <div class="form-control">
                <input type="password" id=""password required>
                <label>Kata Sandi</label>
            </div>
            <button type="submit">Masuk</button>
            <div class="form-help"> 
                <div class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Ingat Aku</label>
                </div>
                <a href="#">Butuh Bantuan?</a>
            </div>
        </form>
        <p>Anggota Baru? <a href="register.html">Daftar Sekarng</a></p>
    </div>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const savedAccount = localStorage.getItem('userAccount');

            if (savedAccount) {
                const accountData = JSON.parse(savedAccount);
                if (usernameInput === accountData.username && passwordInput === accountData.password) {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("loggedInUser", usernameInput); 
                    alert("Login Berhasil! Selamat Datang.");
                    window.location.href = "https://kawaishanio-design.github.io/saya/";
                } else {
                    alert("Nama Pengguna atau Kata Sandi salah!");
                }
            } else {
                alert("Akun tidak ditemukan! Silakan daftar terlebih dahulu.");
                window.location.href = "register.html";
            }
        });
    </script>
</body>
</html>
